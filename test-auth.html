<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JWT Nest Auth Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        #result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
        }

        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>

<body>
    <h1>JWT Nest Auth Test</h1>
    <p>Test users: john / changeme | maria / guess</p>

    <input type="text" id="username" placeholder="Username" value="john">
    <input type="password" id="password" placeholder="Password" value="changeme">
    <button onclick="login()">Login</button>
    <button onclick="register()">Register</button>
    <input type="text" id="token" placeholder="Paste token here">
    <button onclick="getProfile()">Get Profile (/auth/me)</button>
    <button onclick="getUser1()">Get User 1 (/users/1)</button>

    <div id="result"></div>

    <script>
        let globalToken = '';

        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const resultEl = document.getElementById('result');

            try {
                resultEl.innerHTML = 'Logging in...';
                resultEl.className = '';

                const response = await fetch('http://localhost:3000/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (response.ok) {
                    const data = await response.json();
                    globalToken = data.accessToken;
                    document.getElementById('token').value = globalToken;
                    resultEl.innerHTML = `
                        <strong>Success!</strong><br>
                        Token: ${data.accessToken.substring(0, 20)}...<br>
                        User: ${data.username} (ID: ${data.userId})
                    `;
                    resultEl.className = 'success';
                } else {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
            } catch (error) {
                resultEl.innerHTML = `<strong>Error:</strong> ${error.message}`;
                resultEl.className = 'error';
            }
        }

        async function register() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const resultEl = document.getElementById('result');

            try {
                resultEl.innerHTML = 'Registering...';
                const response = await fetch('http://localhost:3000/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (response.ok) {
                    const data = await response.json();
                    globalToken = data.accessToken;
                    document.getElementById('token').value = globalToken;
                    resultEl.innerHTML = `
                        <strong>Registered & Logged in!</strong><br>
                        Token: ${data.accessToken.substring(0, 20)}...<br>
                        User: ${data.username} (ID: ${data.userId})
                    `;
                    resultEl.className = 'success';
                } else {
                    const errorData = await response.json();
                    throw new Error(errorData.message || `HTTP ${response.status}`);
                }
            } catch (error) {
                resultEl.innerHTML = `<strong>Error:</strong> ${error.message}`;
                resultEl.className = 'error';
            }
        }

        async function getProfile() {
            const token = document.getElementById('token').value || globalToken;
            const resultEl = document.getElementById('result');

            try {
                resultEl.innerHTML = 'Fetching profile...';
                const response = await fetch('http://localhost:3000/auth/me', {
                    headers: { Authorization: `Bearer ${token}` }
                });

                if (response.ok) {
                    const data = await response.json();
                    resultEl.innerHTML = `<strong>Profile:</strong><br>${JSON.stringify(data, null, 2)}`;
                    resultEl.className = 'success';
                } else {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
            } catch (error) {
                resultEl.innerHTML = `<strong>Error:</strong> ${error.message}`;
                resultEl.className = 'error';
            }
        }

        async function getUser1() {
            const token = document.getElementById('token').value || globalToken;
            const resultEl = document.getElementById('result');

            try {
                resultEl.innerHTML = 'Fetching user 1...';
                const response = await fetch('http://localhost:3000/users/1', {
                    headers: { Authorization: `Bearer ${token}` }
                });

                if (response.ok) {
                    const data = await response.json();
                    resultEl.innerHTML = `<strong>User 1:</strong><br>${JSON.stringify(data, null, 2)}`;
                    resultEl.className = 'success';
                } else {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
            } catch (error) {
                resultEl.innerHTML = `<strong>Error:</strong> ${error.message}`;
                resultEl.className = 'error';
            }
        }
    </script>
</body>

</html>
