<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JWT Nest Auth Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        #result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
        }

        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>

<body>
    <h1>JWT Nest Auth Test</h1>
    <p>Test users: john / changeme | maria / guess</p>

    <input type="text" id="username" placeholder="Username" value="john">
    <input type="password" id="password" placeholder="Password" value="changeme">
    <button onclick="login()">Login</button>

    <div id="result"></div>

    <script>
        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const resultEl = document.getElementById('result');

            try {
                resultEl.innerHTML = 'Logging in...';
                resultEl.className = '';

                const response = await fetch('http://localhost:3000/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (response.ok) {
                    const data = await response.json();
                    resultEl.innerHTML = `
                        <strong>Success!</strong><br>
                        Token: ${data.accessToken}<br>
                        User: ${data.username} (ID: ${data.userId})
                    `;
                    resultEl.className = 'success';
                    console.log('Auth result:', data);
                } else {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
            } catch (error) {
                resultEl.innerHTML = `<strong>Error:</strong> ${error.message}<br>${error}`;
                resultEl.className = 'error';
                console.error('Login failed:', error);
            }
        }
    </script>
</body>

</html>
